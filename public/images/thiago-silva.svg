<svg xmlns="http://www.w3.org/2000/svg" width="640" height="800" viewBox="0 0 640 800" role="img" aria-label="Foto do personal trainer Thiago Silva — substitua por sua imagem em JPG ou WebP com o mesmo nome se preferir">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#134e4a"/>
      <stop offset="100%" style="stop-color:#022c22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="800" fill="url(#bg)"/>
  <ellipse cx="320" cy="720" rx="280" ry="120" fill="#064e3b" opacity="0.35" filter="url(#soft)"/>
  <circle cx="320" cy="280" r="140" fill="url(#accent)" opacity="0.2"/>
  <path fill="url(#accent)" opacity="0.85" d="M320 140c-62 0-112 50-112 112v48c0 28 22 50 50 50h124c28 0 50-22 50-50v-48c0-62-50-112-112-112zm0 320c-88 0-160 72-160 160v40h320v-40c0-88-72-160-160-160z"/>
  <text x="320" y="620" text-anchor="middle" fill="#ecfdf5" font-family="system-ui,sans-serif" font-size="42" font-weight="700" letter-spacing="4">THIAGO SILVA</text>
  <text x="320" y="668" text-anchor="middle" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="16" letter-spacing="6">PERSONAL TRAINER</text>
  <text x="320" y="740" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13">Substitua este arquivo por sua foto (recomendado: 800×1000px)</text>
</svg>
